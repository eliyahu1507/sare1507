<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SARE 1507 — Búsqueda Nominal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  :root { --guinda: #6B1C3E; --dorado: #C8962A; --blanco: #FFF; --gris-bg: #F7F4F5; --verde: #1A7A3A; --azul: #1565C0; --alerta: #FF6F00; }
  body { font-family: 'Open Sans', sans-serif; background: var(--gris-bg); margin: 0; padding-bottom: 50px; }
  
  header { background: var(--guinda); color: var(--blanco); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--dorado); }
  .user-info { text-align: right; }
  .user-info h1 { font-family: 'Montserrat', sans-serif; font-size: 1rem; margin: 0; }
  .user-info p { font-size: 0.8rem; opacity: 0.9; margin: 0; }

  .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
  .search-box { background: var(--blanco); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
  
  input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; margin-top: 10px; }
  .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-family: 'Montserrat', sans-serif; margin-top: 10px; }
  .btn-buscar { background: var(--dorado); color: white; width: 100%; }
  
  #reader { width: 100%; max-width: 400px; margin: 10px auto; border-radius: 8px; overflow: hidden; }
  #loader-db { background: var(--guinda); color: white; padding: 10px; text-align: center; border-radius: 8px; margin-bottom: 10px; }
</style>
</head>
<body>

<header>
  <div><strong>SARE 1507</strong><br>Procesos Anteriores</div>
  <div class="user-info">
    <h1>JOSE ELIAS CERVANTES JIMENEZ</h1>
    <p>SERVIDOR EDUCATIVO - ENLACE INFORMATICO</p>
  </div>
</header>

<div class="container">
  <div id="loader-db">📥 Cargando padrones...</div>

  <div class="search-box">
    <label><strong>Búsqueda por Nombre:</strong></label>
    <input type="text" id="input-nombre" placeholder="Escribe el nombre completo...">
    <button class="btn btn-buscar" onclick="buscarPorNombre()">BUSCAR EN PADRÓN</button>
  </div>

  <div class="search-box">
    <div id="reader"></div>
    <button class="btn" style="width:100%" onclick="iniciarScanner()">ACTIVAR ESCÁNER QR</button>
  </div>
</div>

<div id="modal-bg" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:white; padding:20px; border-radius:12px; width:90%; max-width:500px; max-height:80vh; overflow-y:auto;">
    <h2 id="modal-title">Resultado</h2>
    <div id="modal-body"></div>
    <button class="btn" style="background:#666; color:white; width:100%" onclick="document.getElementById('modal-bg').style.display='none'">CERRAR</button>
  </div>
</div>

<script>
let nominalDatos = [];

async function cargarPadrones() {
  const archivos = ['basica.csv', 'bueems.csv', 'jef.csv', 'bueems_feb.csv'];
  for (const url of archivos) {
    const res = await fetch(url);
    if (res.ok) {
      const data = Papa.parse(await res.text(), { header: true }).data;
      data.forEach(row => {
        const keys = Object.keys(row);
        const get = (n) => (row[keys.find(k => k.toUpperCase().includes(n))] || '').trim();
        nominalDatos.push({
          curp: get('CURP'),
          nombre: `${get('NOMBRE')} ${get('PRIMER APELLIDO')} ${get('SEGUNDO APELLIDO')}`.trim(),
          nivel: url.split('.')[0].toUpperCase(),
          proceso: get('PROCESO')
        });
      });
    }
  }
  document.getElementById('loader-db').style.display = 'none';
}
cargarPadrones();

function buscarPorNombre() {
  const query = document.getElementById('input-nombre').value.toUpperCase();
  const resultados = nominalDatos.filter(d => d.nombre.toUpperCase().includes(query));
  mostrarResultados(resultados, "Resultados de búsqueda");
}

function mostrarResultados(resultados, titulo) {
  const body = document.getElementById('modal-body');
  body.innerHTML = resultados.length > 0 ? resultados.map(r => `
    <div style="border-bottom:1px solid #ccc; padding:10px 0;">
      <p><strong>${r.nombre}</strong></p>
      <p>Nivel: ${r.nivel} | Proceso: ${r.proceso}</p>
      <p>CURP: ${r.curp}</p>
    </div>`).join('') : '<p>No se encontraron coincidencias.</p>';
  document.getElementById('modal-title').textContent = titulo;
  document.getElementById('modal-bg').style.display = 'flex';
}

function iniciarScanner() {
  const scanner = new Html5Qrcode("reader");
  scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, 
    (decodedText) => {
      scanner.stop();
      const res = nominalDatos.filter(d => decodedText.includes(d.curp));
      mostrarResultados(res, "Resultado del Escáner");
    });
}
</script>
</body>
</html>
