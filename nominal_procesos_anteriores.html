<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SARE 1507 — Búsqueda Nominal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  :root { --guinda: #6B1C3E; --dorado: #C8962A; --blanco: #FFF; --gris-bg: #F7F4F5; }
  body { font-family: 'Open Sans', sans-serif; background: var(--gris-bg); margin: 0; padding-bottom: 50px; }
  
  header { background: var(--guinda); color: var(--blanco); padding: 15px 20px; border-bottom: 4px solid var(--dorado); display: flex; justify-content: space-between; align-items: center; }
  .header-center { text-align: center; flex-grow: 1; }
  .header-center h1 { font-size: 0.9rem; margin: 0; font-weight: 800; }
  .header-center p { font-size: 0.7rem; margin: 0; opacity: 0.9; }
  
  .info-bar { background: var(--blanco); padding: 10px 20px; display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 600; border-bottom: 1px solid #ddd; }
  
  .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
  .box { background: var(--blanco); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
  
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--blanco); padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid var(--guinda); }
  .stat-card .num { font-size: 1.2rem; font-weight: 800; color: var(--guinda); }
  
  input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-top: 10px; box-sizing: border-box; }
  .btn { padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; width: 100%; font-family: 'Montserrat'; }
  .btn-buscar { background: var(--dorado); color: white; }
  #reader { width: 100%; max-width: 350px; margin: 10px auto; }
</style>
</head>
<body>

<header>
  <div><strong>SARE 1507</strong></div>
  <div class="header-center">
    <h1>JOSE ELIAS CERVANTES JIMENEZ</h1>
    <p>SERVIDOR EDUCATIVO - ENLACE INFORMATICO</p>
    <p>PROGRAMA DE BECAS PARA EL BIENESTAR</p>
  </div>
  <div><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/Gobierno_de_Mexico_logo.svg" height="30"></div>
</header>

<div class="info-bar">
  <div id="clock-date">Cargando fecha...</div>
  <div id="clock-time">00:00:00</div>
</div>

<div class="container">
  <div id="status" style="padding:10px; background:var(--dorado); color:white; border-radius:8px; margin-bottom:15px; text-align:center;">Cargando archivos de datos...</div>

  <div class="stats-grid">
    <div class="stat-card"><div>Total</div><div class="num" id="stat-total">0</div></div>
    <div class="stat-card"><div>Básica</div><div class="num" id="stat-basica">0</div></div>
    <div class="stat-card"><div>BUEEMS</div><div class="num" id="stat-bueems">0</div></div>
    <div class="stat-card"><div>JEF</div><div class="num" id="stat-jef">0</div></div>
  </div>

  <div class="box">
    <strong>Búsqueda Manual:</strong>
    <input type="text" id="input-nombre" placeholder="Escribe el nombre...">
    <button class="btn btn-buscar" onclick="buscarPorNombre()">BUSCAR EN PADRÓN</button>
  </div>

  <div class="box">
    <div id="reader"></div>
    <button class="btn" style="background:var(--guinda); color:white" onclick="iniciarScanner()">ACTIVAR ESCÁNER QR</button>
  </div>
</div>

<script>
let nominalDatos = [];

function tick() {
  const now = new Date();
  document.getElementById('clock-time').textContent = now.toLocaleTimeString();
  document.getElementById('clock-date').textContent = now.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'short'});
}
setInterval(tick, 1000); tick();

async function cargar() {
  const files = ['basica.csv', 'bueems.csv', 'jef.csv', 'bueems_feb.csv'];
  for (const f of files) {
    try {
      const res = await fetch(f);
      if(!res.ok) continue;
      const csv = await res.text();
      const data = Papa.parse(csv, { header: true }).data;
      data.forEach(r => {
        const get = (n) => Object.values(r).find((v,i) => Object.keys(r)[i].toUpperCase().includes(n)) || '';
        nominalDatos.push({ curp: get('CURP'), nombre: (get('NOMBRE') + ' ' + get('APELLIDO')).trim().toUpperCase(), nivel: f, proceso: get('PROCESO') });
      });
    } catch(e) {}
  }
  document.getElementById('status').style.display = 'none';
  document.getElementById('stat-total').textContent = nominalDatos.length;
  document.getElementById('stat-basica').textContent = nominalDatos.filter(d => d.nivel.includes('basica')).length;
  document.getElementById('stat-bueems').textContent = nominalDatos.filter(d => d.nivel.includes('bueems')).length;
  document.getElementById('stat-jef').textContent = nominalDatos.filter(d => d.nivel.includes('jef')).length;
}
cargar();

function buscarPorNombre() {
  const query = document.getElementById('input-nombre').value.toUpperCase();
  const res = nominalDatos.filter(d => d.nombre.includes(query));
  alert(res.length ? res.map(r => r.nombre + ' - ' + r.curp).join('\n') : "No encontrado");
}

function iniciarScanner() {
  const s = new Html5Qrcode("reader");
  s.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (t) => {
    s.stop();
    const res = nominalDatos.find(d => t.toUpperCase().includes(d.curp.toUpperCase()));
    alert(res ? `ENCONTRADO: ${res.nombre}` : "No hallado");
  });
}
</script>
</body>
</html>
