<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SARE 1507 — Módulo de Captura</title>
    <style>
        .selector-capturista { background: #fff8e1; padding: 15px; border-left: 5px solid #C8962A; margin-bottom: 20px; border-radius: 4px; }
        select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>Módulo de Captura SARE 1507</h1>

    <div class="selector-capturista">
        <label><strong>Selecciona al Capturista en Turno:</strong></label>
        <select id="select-capturista">
            <option value="">-- Selecciona personal --</option>
            <option value="JOSE ELIAS CERVANTES">JOSE ELIAS CERVANTES</option>
            <option value="MARIA GUADALUPE ESCARCEGA">MARIA GUADALUPE ESCARCEGA</option>
            </select>
    </div>

    <input type="text" id="input-scan" class="scanner-input" placeholder="Escanear QR CURP aquí..." oninput="procesarDatos(this.value)">

    <div id="resultado-panel" class="coincidencia-card">
        <h2 id="nombre-ben"></h2>
        <p>Atendido por: <strong id="lbl-capturista"></strong></p>
        <p>Escuela: <strong id="escuela-ben"></strong></p>
        
        <div class="foto-grid" id="grid-fotos"></div>
    </div>
</div>

<script>
    function procesarDatos(valor) {
        const capturista = document.getElementById('select-capturista').value;
        if (!capturista) { 
            alert("¡Error! Primero debes seleccionar al Capturista."); 
            return; 
        }
        
        if (valor.length < 15) return;
        
        // ... (Tu lógica de búsqueda que ya tenías) ...
        
        // Al mostrar el panel, fijamos el nombre del capturista
        document.getElementById('lbl-capturista').textContent = capturista;
    }
</script>
</body>
</html>
