<script>
    // 1. LÓGICA DE ESCÁNER
    let codeReader = null;
    function iniciarCam() {
        navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}})
        .then(stream => {
            const video = document.getElementById('video');
            video.srcObject = stream;
            video.play();
            document.getElementById('video-container').classList.add('active');
            codeReader = new ZXing.BrowserMultiFormatReader();
            codeReader.decodeFromStream(stream, video, (result, err) => {
                if (result) {
                    const curp = result.getText().split('|')[0].toUpperCase();
                    document.getElementById('curp-input').value = curp;
                    detenerCam();
                    document.getElementById('btn-validar').click();
                }
            });
        }).catch(e => alert("Error de cámara: " + e.message));
    }

    function detenerCam() {
        if(codeReader) codeReader.reset();
        document.getElementById('video-container').classList.remove('active');
    }
